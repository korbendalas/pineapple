name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw -B test

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_SSH_KEY }}" || { echo "Missing secret: EC2_SSH_KEY"; exit 1; }

      - name: Deploy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          source: "target/*.jar"
          target: "/home/ubuntu/app/"
          strip_components: 1

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            NEW_JAR=$(ls -t /home/ubuntu/app/*.jar 2>/dev/null | grep -v '/myapp.jar$' | head -n 1 || true)

            if [ -n "$NEW_JAR" ]; then
              mv "$NEW_JAR" /home/ubuntu/app/myapp.jar
            elif [ ! -f /home/ubuntu/app/myapp.jar ]; then
              echo "No JAR found in /home/ubuntu/app"
              exit 1
            fi

            sudo systemctl restart myapp
            sleep 5
            sudo systemctl --no-pager status myapp
